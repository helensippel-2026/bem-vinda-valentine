<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>We're really Buddies</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2FF;
  --blue:#294AE0;
  --blue2:#3D5EF5;
  --blue-light:#E4E8FF;
  --blue-mid:#c5ceff;
  --text:#0D0F1E;
  --text-muted:#5a6080;
  --text-hint:#9aa0c0;
  --glow:rgba(41,74,224,0.2);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .4s;z-index:10}
.screen.active{opacity:1;pointer-events:all}

/* ── INTRO ── */
#intro{gap:0}
.intro-eyebrow{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-hint);margin-bottom:2.5rem}
.intro-title{font-family:'Syne',sans-serif;font-size:clamp(32px,7vw,56px);font-weight:800;line-height:1.05;text-align:center;margin-bottom:1rem;color:var(--blue)}
.intro-sub{font-size:15px;color:var(--text-muted);text-align:center;line-height:1.6;max-width:320px;margin-bottom:3rem}
.buddy-photos{display:flex;align-items:center;gap:12px;margin-bottom:3rem}
.buddy-avatar{width:62px;height:62px;border-radius:50%;object-fit:cover;border:2.5px solid var(--blue-mid);box-shadow:0 4px 16px rgba(41,74,224,.15)}
.buddy-gem{font-size:22px;line-height:1}
.btn-play{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;padding:18px 52px;border-radius:99px;border:none;cursor:pointer;background:var(--blue);color:#fff;letter-spacing:.02em;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 24px var(--glow);position:relative;overflow:hidden}
.btn-play::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none}
.btn-play:hover{transform:scale(1.04);box-shadow:0 6px 36px var(--glow)}
.btn-play:active{transform:scale(0.97)}

/* ── GAME ── */
#game{justify-content:space-between;padding:1.25rem 0 1.75rem;width:100%;max-width:100%;align-items:stretch}
.game-top{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;max-width:520px;margin:0 auto;width:100%}
.g-logo{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--blue);opacity:.6}
.g-back{background:none;border:1.5px solid var(--blue-mid);color:var(--text-muted);font-size:12px;padding:6px 14px;border-radius:99px;cursor:pointer;transition:all .2s}
.g-back:hover{border-color:var(--blue);color:var(--blue)}
.meta-wrap{text-align:center;max-width:520px;margin:0 auto;width:100%;padding:0 1.5rem}
.phase-dots{display:none}
.pdot{width:8px;height:8px;border-radius:50%;background:var(--blue-mid);cursor:pointer;transition:all .25s}
.pdot.active{width:24px;border-radius:99px;background:var(--blue)}
.pdot.done{background:var(--blue-mid);opacity:.5}
.phase-label-tag{display:inline-block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:99px;padding:4px 14px;margin-bottom:6px}
.phase-label-q{font-size:13px;color:var(--text-muted);font-style:italic}

/* ── CAROUSEL ── */
.carousel-area{position:relative;width:100%;flex-shrink:0}
#cardStrip{position:absolute;top:0;left:0;display:flex;align-items:center;will-change:transform}

/* CARD */
.sc{flex-shrink:0;cursor:pointer;perspective:1000px;transition:opacity .18s,transform .18s}
.sc.dim{opacity:.25;transform:scale(.91)}
.sc.center{opacity:1;transform:scale(1)}

.sc-flipper{width:100%;height:100%;position:relative;transform-style:preserve-3d;border-radius:20px}

.sc-face{
  position:absolute;inset:0;border-radius:20px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;
}
.sc-front{
  background:#fff;
  box-shadow:0 8px 40px rgba(41,74,224,.12),0 2px 8px rgba(41,74,224,.08);
  border:1px solid var(--blue-mid);
}
.sc-back{
  background:var(--blue);
  border:none;
  box-shadow:0 8px 40px rgba(41,74,224,.25);
  transform:rotateY(180deg);
}
.sc-q{font-family:'Syne',sans-serif;font-size:clamp(16px,2.8vw,21px);font-weight:700;color:var(--text);text-align:center;line-height:1.38}
.sc-brand{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-hint);margin-top:1.25rem}
.sc-back-title{font-family:'Syne',sans-serif;font-size:clamp(13px,1.8vw,16px);font-weight:800;color:#fff;text-align:center;line-height:1.25}

.tap-hint{text-align:center;font-size:11px;color:var(--text-hint);margin-top:.55rem;letter-spacing:.04em;transition:opacity .3s}

/* ── CONTROLS ── */
.controls{display:flex;justify-content:center;padding:0 1.5rem;max-width:520px;margin:0 auto;width:100%}
.btn-shuffle{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;padding:15px 52px;border-radius:99px;border:none;cursor:pointer;background:var(--blue);color:#fff;letter-spacing:.02em;transition:transform .15s,box-shadow .15s,opacity .2s;box-shadow:0 4px 24px var(--glow);position:relative;overflow:hidden}
.btn-shuffle::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);pointer-events:none}
.btn-shuffle:hover{transform:scale(1.04);box-shadow:0 6px 36px var(--glow)}
.btn-shuffle:active{transform:scale(0.97)}
.btn-shuffle:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* ── DONE OVERLAY ── */
#done-overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:rgba(240,242,255,.96);backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity .4s}
#done-overlay.visible{opacity:1;pointer-events:all}
.done-icon{font-size:56px;margin-bottom:1.5rem}
.done-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:.75rem;color:var(--blue);text-align:center}
.done-sub{font-size:15px;color:var(--text-muted);line-height:1.7;text-align:center;max-width:300px;margin-bottom:2.5rem}
.done-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.btn-done-next{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;padding:16px;border-radius:14px;background:var(--blue);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 24px var(--glow);transition:all .15s}
.btn-done-next:hover{background:var(--blue2);transform:scale(1.02)}
.btn-done-sec{font-size:14px;padding:14px;border-radius:14px;background:transparent;color:var(--text-muted);border:1.5px solid var(--blue-mid);cursor:pointer;transition:all .15s}
.btn-done-sec:hover{color:var(--blue);border-color:var(--blue)}

.conf{position:fixed;pointer-events:none;z-index:200;border-radius:2px;animation:conffall 1.4s ease-out forwards}
@keyframes conffall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

.buddy-gem{display:flex;align-items:center;justify-content:center;width:32px;height:32px}
.buddy-gem svg{width:28px;height:28px}
</style>

function CW(){ return Math.min(370, window.innerWidth*0.76) }
function CH(){ return Math.min(255, window.innerWidth*0.50) }
function slotX(i){ return window.innerWidth/2 - CW()/2 - i*(CW()+GAP) }

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]] } return a }
function initDecks(){ decks=phases.map(p=>{ const last=p.cards.length-1; const rest=shuffle([...Array(last).keys()]); return [...rest,last] }) }
// remainingQueue holds deck indices not yet shown this phase
function initQueue(){ remainingQueue=[...decks[cp]]; currentDeckIdx=remainingQueue[0] }

const flipState={};
function getFlipper(i){ return document.getElementById('fp'+i) }
function setFlipInstant(i,deg){ flipState[i]=deg; const fp=getFlipper(i); if(!fp)return; fp.style.transition='none'; fp.style.transform=`rotateY(${deg}deg)` }
function setFlipAnimated(i,deg){ flipState[i]=deg; const fp=getFlipper(i); if(!fp)return; fp.style.transition='transform .5s cubic-bezier(.4,0,.2,1)'; fp.style.transform=`rotateY(${deg}deg)` }

// PARTICLES — light blue dots on white bg
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
let pts=[];
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight }
resizeCanvas(); window.addEventListener('resize',()=>{ resizeCanvas(); syncCarouselSize() });
for(let i=0;i<60;i++) pts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2+.5,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,a:Math.random()*.12+.04});
(function loop(){ ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach(p=>{ p.x=(p.x+p.vx+canvas.width)%canvas.width; p.y=(p.y+p.vy+canvas.height)%canvas.height; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(41,74,224,${p.a})`; ctx.fill() }); requestAnimationFrame(loop) })();

function confetti(){
  ['#294AE0','#3D5EF5','#7d9bff','#294AE0','#a5b8ff'].forEach(c=>{
    for(let i=0;i<12;i++){ const el=document.createElement('div'); el.className='conf'; el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${c};transform:rotate(${Math.random()*360}deg);animation-delay:${Math.random()*.7}s;animation-duration:${1.2+Math.random()*.8}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;`; document.body.appendChild(el); setTimeout(()=>el.remove(),2600) }
  });
}

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active') }
function startGame(){ initDecks(); cp=0; initQueue(); showScreen('game'); buildStrip(); renderMeta() }
function goIntro(){ hideDone(); showScreen('intro') }

function syncCarouselSize(){
  const area=document.getElementById('carouselArea');
  const h=CH(); area.style.height=h+'px';
  document.getElementById('cardStrip').style.height=h+'px';
  document.getElementById('cardStrip').style.transform=`translateX(${slotX(centerSlot)}px)`;
  document.querySelectorAll('.sc').forEach(el=>{ el.style.width=CW()+'px'; el.style.height=CH()+'px' });
}

function makeCard(text,tag){
  const el=document.createElement('div');
  el.className='sc dim';
  el.style.width=CW()+'px'; el.style.height=CH()+'px';
  el.innerHTML=`<div class="sc-flipper" style="transform:rotateY(180deg)">
    <div class="sc-face sc-front"><div class="sc-q">${text}</div><div class="sc-brand">we're really buddies</div></div>
    <div class="sc-face sc-back"><div class="sc-back-title">We're really<br>Buddies</div></div>
  </div>`;
  return el;
}

function buildStrip(){
  const strip=document.getElementById('cardStrip');
  strip.innerHTML='';
  Object.keys(flipState).forEach(k=>delete flipState[k]);

  const cards=phases[cp].cards;
  stripCards=[];
  // Strip contains only the remaining queue cards, repeated for visual depth
  const queue=[...remainingQueue];
  const copies=Math.max(COPIES, Math.ceil(12/queue.length)+1);
  for(let r=0;r<copies;r++) queue.forEach((di)=>stripCards.push({text:cards[di],deckIdx:di}));

  // center on the first card in queue
  const firstDeckIdx=remainingQueue[0];
  centerSlot=Math.floor(copies/2)*queue.length + queue.indexOf(firstDeckIdx);

  stripCards.forEach((c,i)=>{
    const el=makeCard(c.text,phases[cp].tag);
    el.id='sc'+i;
    el.querySelector('.sc-flipper').id='fp'+i;
    flipState[i]=180;
    if(i===centerSlot){ el.classList.remove('dim'); el.classList.add('center') }
    strip.appendChild(el);
  });

  syncCarouselSize();
  strip.style.gap=GAP+'px';

  strip.onclick=(e)=>{
    if(spinning) return;
    const centerEl=document.getElementById('sc'+centerSlot);
    if(!centerEl) return;
    const r=centerEl.getBoundingClientRect();
    if(e.clientX>=r.left && e.clientX<=r.right && e.clientY>=r.top && e.clientY<=r.bottom){
      const cur=flipState[centerSlot]||180;
      setFlipAnimated(centerSlot, cur===180?0:180);
    }
  };
}

function extendStrip(needed){
  if(needed<=stripCards.length) return;
  const strip=document.getElementById('cardStrip');
  const cards=phases[cp].cards;
  const queue=[...remainingQueue];
  if(!queue.length) return;
  while(stripCards.length<=needed){
    queue.forEach(di=>{
      const i=stripCards.length;
      stripCards.push({text:cards[di],deckIdx:di});
      const el=makeCard(cards[di],phases[cp].tag);
      el.id='sc'+i; el.querySelector('.sc-flipper').id='fp'+i;
      flipState[i]=180; strip.appendChild(el);
    });
  }
}

function doShuffle(){
  if(spinning) return;

  // Consume current card from queue
  remainingQueue.shift();

  // Phase done — all cards seen
  if(remainingQueue.length===0){ showDone(); return; }

  spinning=true;
  setFlipInstant(centerSlot,180);
  document.getElementById('shuffleBtn').disabled=true;
  document.getElementById('tapHint').style.opacity='0';

  const cards=phases[cp].cards, cw=CW();
  const target=remainingQueue[0];
  const queue=[...remainingQueue];

  // Always spin at least 8 slots visually for a satisfying speed
  const minVisualSlots = 8 + Math.floor(Math.random()*4);

  // Find occurrence of target that is at least minVisualSlots ahead
  extendStrip(centerSlot + queue.length * 6);
  let targetSlot=-1;
  for(let i=centerSlot+minVisualSlots; i<stripCards.length; i++){
    if(stripCards[i].deckIdx===target){ targetSlot=i; break; }
  }
  if(targetSlot===-1){
    extendStrip(centerSlot+queue.length*12);
    for(let i=centerSlot+minVisualSlots; i<stripCards.length; i++){
      if(stripCards[i].deckIdx===target){ targetSlot=i; break; }
    }
  }

  extendStrip(targetSlot+queue.length+2);
  for(let i=0;i<stripCards.length;i++) setFlipInstant(i,180);

  const startX=slotX(centerSlot), endX=slotX(targetSlot), dist=startX-endX;
  const duration=1700+Math.random()*400, t0=performance.now();
  const startSlot=centerSlot; let lastSlot=startSlot;
  function easeOut(t){ return 1-Math.pow(1-t,4) }
  const strip=document.getElementById('cardStrip');
  strip.style.transition='none';

  function tick(now){
    const t=Math.min((now-t0)/duration,1), e=easeOut(t);
    strip.style.transform=`translateX(${startX-e*dist}px)`;
    const slotNow=Math.round(startSlot+e*dist/(cw+GAP));
    if(slotNow!==lastSlot && slotNow>=0 && slotNow<stripCards.length){
      document.getElementById('sc'+lastSlot)?.classList.replace('center','dim');
      lastSlot=slotNow; centerSlot=slotNow;
      document.getElementById('sc'+slotNow)?.classList.replace('dim','center');
    }
    if(t<1){ requestAnimationFrame(tick); return }
    strip.style.transform=`translateX(${endX}px)`;
    centerSlot=targetSlot; currentDeckIdx=target;
    stripCards.forEach((_,i)=>{
      const el=document.getElementById('sc'+i); if(!el)return;
      if(i===centerSlot){ el.classList.remove('dim'); el.classList.add('center') }
      else { el.classList.remove('center'); el.classList.add('dim') }
    });
    spinning=false;
    document.getElementById('shuffleBtn').disabled=false;
    document.getElementById('tapHint').style.opacity='1';
  }
  requestAnimationFrame(tick);
}

function renderMeta(){
  const dotsEl=document.getElementById('phaseDots'); dotsEl.innerHTML='';
  phases.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i===cp?' active':i<cp?' done':'');
    d.onclick=()=>{ if(!spinning){ cp=i; initQueue(); hideDone(); buildStrip(); renderMeta() } };
    dotsEl.appendChild(d);
  });
  document.getElementById('phaseTag').textContent=phases[cp].tag;
  document.getElementById('phaseQ').textContent='"'+phases[cp].sub+'"';
}

function showDone(){
  const phase=phases[cp], isLast=cp===phases.length-1; confetti();
  document.getElementById('doneIcon').textContent=phase.emoji;
  document.getElementById('doneTitle').textContent=isLast?'Vocês são incríveis!':'Fase concluída!';
  document.getElementById('doneSub').textContent=isLast?'Chegaram ao fim! Que conversa incrível 🎉':`A fase de ${phase.label} acabou. Prontas pra ir mais fundo?`;
  const btns=document.getElementById('doneBtns'); btns.innerHTML='';
  if(!isLast){
    const b=document.createElement('button'); b.className='btn-done-next';
    b.textContent=`Fase ${phases[cp+1].id}: ${phases[cp+1].label} →`;
    b.onclick=()=>{ cp++; initQueue(); hideDone(); buildStrip(); renderMeta() };
    btns.appendChild(b);
  }
  const b2=document.createElement('button'); b2.className='btn-done-sec';
  b2.textContent='Voltar ao início'; b2.onclick=goIntro; btns.appendChild(b2);
  document.getElementById('done-overlay').classList.add('visible');
}
function hideDone(){ document.getElementById('done-overlay').classList.remove('visible') }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ') doShuffle();
  if((e.key==='f'||e.key==='F')&&!spinning){
    const cur=flipState[centerSlot]||180;
    setFlipAnimated(centerSlot,cur===180?0:180);
  }
});
</script>
</body>
